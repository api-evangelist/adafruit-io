  description: REST API for Adafruit IO providing CRUD operations across feeds, time-series
    data points, groups, dashboards, dashboard blocks, triggers (reactive and scheduled
    actions), API tokens, permissions/ACL, account activities, and inbound webhooks.
    Base URL https://io.adafruit.com/api/v2 — authenticated via the X-AIO-Key header
    or query parameter using an Adafruit IO API key. Supports batch data writes, chart-aggregated
    reads, positional queries (first/last/previous/next/retain), and Link-header pagination
    up to 1000 records per page.
- aid: adafruit-io:adafruit-io-mqtt-api
  name: Adafruit IO MQTT API
  tags:
  - IoT
  - Internet of Things
  - MQTT
  - Realtime
  - Feeds
  humanURL: https://io.adafruit.com/api/docs/mqtt.html
  baseURL: mqtts://io.adafruit.com:8883
  properties:
  - url: https://io.adafruit.com/api/docs/mqtt.html
    type: Documentation
  - url: https://io.adafruit.com/api/docs/mqtt.html#mqtt-topics
    type: Documentation
  description: MQTT broker at io.adafruit.com for publish/subscribe access to Adafruit
    IO feeds and groups. TLS on port 8883, plaintext on 1883, and MQTT-over-WebSocket
    on port 443. Authenticate with your Adafruit IO username and API key. Supports
    QoS 0 and QoS 1 (QoS 2 not supported); MQTT retain flag is not honored — use the
    /get topic modifier to fetch the last value of a feed instead. Topic structure
    includes feed topics ({username}/feeds/{key}), compact aliases ({username}/f/{key}),
    JSON/CSV suffixes, group topics ({username}/groups/{key}), throttle ({username}/throttle),
    and errors ({username}/errors). Wildcard subscriptions with `+` and `#` are supported
    for feed discovery.
- aid: adafruit-io:adafruit-io-webhooks-api
  name: Adafruit IO Webhooks API
  tags:
  - IoT
  - Internet of Things
  - Webhooks
  - Feeds
  humanURL: https://io.adafruit.com/api/docs/#webhooks
  baseURL: https://io.adafruit.com/api/v2/webhooks
  properties:
  - url: https://io.adafruit.com/api/docs/#webhooks
    type: Documentation
  - url: openapi/adafruit-io-rest-api-openapi.yml
    type: OpenAPI
  description: Token-authenticated inbound webhook endpoints that allow third-party
    services (IFTTT, Zapier, Make, or any HTTP client) to push data into an Adafruit
    IO feed without an API key. Endpoints include the standard JSON webhook (POST
    /webhooks/feed/:token), the raw-payload webhook (POST /webhooks/feed/:token/raw)
    for arbitrary request bodies, and a notify webhook (POST /webhooks/feed/:token/notify)
    for ping-style triggers. Tokens are generated per-feed and managed in the Adafruit
    IO UI.
