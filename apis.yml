description: Adafruit IO is a cloud Internet of Things platform from Adafruit Industries
  built for makers, hobbyists, students, and STEM educators. It provides feed-based
  time-series storage, drag-and-drop dashboards with 20+ visualization block types,
  actions/triggers for SMS/voice/email/webhook notifications, built-in services (time,
  weather, randomizer, air quality), and a complete REST + MQTT API surface for Adafruit
  Feather and Metro boards, ESP32 / ESP8266 / Pico microcontrollers, Raspberry Pi,
  and any other HTTP- or MQTT-capable hardware. First-class Arduino, CircuitPython,
  and Python client libraries plus the no-code Wippersnapper firmware make it the
  easiest way for hobbyists to get their projects onto the Internet of Things.
