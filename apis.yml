- type: Features
  data:
  - Feed-centric time-series datastore for IoT sensor and actuator values
  - Drag-and-drop dashboards with 20+ block types (gauges, charts, toggles, sliders,
    maps, color pickers, image, indicators, text, number pad, selector, etc.)
  - Feed groups for organizing related feeds and batch group writes
  - Actions/Triggers — reactive triggers (threshold, equal, change) and scheduled
    actions (every N minutes, hours, daily, weekly)
  - Webhook-in endpoints (standard, raw, notify) for ingesting data without an API
    key
  - SMS, voice, email, and webhook notifications via actions (Plus tier)
  - Built-in services — time service, randomizer, weather forecasts, air quality
  - MQTT broker at io.adafruit.com with TLS (8883), plain (1883), and WebSocket (443)
    transports
  - Adafruit IO Wippersnapper firmware — no-code MQTT firmware for ESP32, ESP8266,
    and Pico
  - First-class Arduino and CircuitPython client libraries
  - Public feed sharing and embeddable dashboards
  - Permission/ACL primitive for fine-grained sharing of feeds, dashboards, and groups
  - Personal access tokens for scoped, revocable credentials separate from the main
    API key
  - Account activities log with type filtering
  - Throttle topic to monitor rate-limit pressure programmatically
  - Single comprehensive Swagger 2.0 / OpenAPI spec published in adafruit/io-api on
    GitHub
  - IFTTT and Zapier integrations for cross-service automation
  - Optimized for makers, hobbyists, and STEM education with Adafruit Feather, Metro,
    and Raspberry Pi hardware
  sources:
  - https://io.adafruit.com/api/docs/
  - https://io.adafruit.com/api/docs/mqtt.html
  - https://io.adafruit.com/plus
