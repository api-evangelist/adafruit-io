naftiko: 1.0.0-alpha2
info:
  label: Adafruit IO REST API — Triggers
  description: 'Adafruit IO Triggers (Actions) — reactive triggers fired on feed value comparisons (threshold,
    equal, change) and scheduled triggers that fire on a schedule. Self-contained Naftiko capability.'
  tags:
  - Adafruit IO
  - Triggers
  - Actions
  - IoT
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ADAFRUIT_IO_USERNAME: ADAFRUIT_IO_USERNAME
    ADAFRUIT_IO_KEY: ADAFRUIT_IO_KEY
capability:
  consumes:
  - type: http
    namespace: adafruit-io-triggers
    baseUri: https://io.adafruit.com/api/v2
    description: Adafruit IO Triggers REST surface.
    resources:
    - name: triggers
      path: /{username}/triggers
      operations:
      - name: listtriggers
        method: GET
        description: List All Triggers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
      - name: createtrigger
        method: POST
        description: Create a New Trigger
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: triggers-id
      path: /{username}/triggers/{id}
      operations:
      - name: gettrigger
        method: GET
        description: Get a Trigger by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetrigger
        method: PUT
        description: Replace a Trigger (PUT)
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patchtrigger
        method: PATCH
        description: Partially Update a Trigger
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletetrigger
        method: DELETE
        description: Delete a Trigger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-AIO-Key
      value: '{{env.ADAFRUIT_IO_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: adafruit-io-triggers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adafruit IO Triggers.
    tools:
    - name: adafruit-io-list-triggers
      description: List All Triggers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adafruit-io-triggers.listtriggers
      outputParameters:
      - type: array
        mapping: $.
    - name: adafruit-io-create-trigger
      description: Create a New Trigger
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: adafruit-io-triggers.createtrigger
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adafruit-io-get-trigger
      description: Get a Trigger by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adafruit-io-triggers.gettrigger
      outputParameters:
      - type: object
        mapping: $.
    - name: adafruit-io-update-trigger
      description: Replace a Trigger
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: adafruit-io-triggers.updatetrigger
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adafruit-io-delete-trigger
      description: Delete a Trigger
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: adafruit-io-triggers.deletetrigger
      outputParameters:
      - type: object
        mapping: $.
